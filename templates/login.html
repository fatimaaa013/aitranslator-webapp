<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        :root {
            --bg: #f2efe9;
            --card: #faf9f6;
            --border: #ddd9d0;
            --text: #1a1a18;
            --text-muted: #8a8780;
            --accent: #2c2c28;
            --accent-hover: #444440;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.8), transparent 32%),
                linear-gradient(180deg, #f4f1eb 0%, #ece7df 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: var(--card);
            padding: 32px;
            border-radius: 20px;
            box-shadow: 0 18px 40px rgba(43, 35, 25, 0.08);
            width: 360px;
            border: 1px solid rgba(214, 208, 198, 0.9);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            font-weight: 600;
            color: var(--text);
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #fdfbf7;
            font-size: 14px;
        }

        button {
            margin-top: 18px;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 999px;
            background: var(--accent);
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background: var(--accent-hover);
        }

        p {
            margin-top: 16px;
            font-size: 13px;
            color: var(--text-muted);
        }

        a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }

        .error {
            color: #8f4b4b;
            font-size: 13px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Login</h2>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input type="email" name="email" placeholder="Enter email" required>
        <input type="password" name="password" placeholder="Enter password" required>
        <button type="submit">Login</button>
    </form>

    <p>
        Don’t have an account?
        <a href="/signup">Signup</a>
    </p>

</div>

</body>
</html>
